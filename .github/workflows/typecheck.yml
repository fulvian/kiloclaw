name: typecheck

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Run typecheck with tsc (stable)
        run: |
          # Run tsc on all packages using their tsconfig
          for pkg in packages/*/package.json; do
            dir=$(dirname "$pkg")
            if [ -f "$dir/tsconfig.json" ]; then
              echo "Typechecking $dir..."
              npx tsc --noEmit -p "$dir/tsconfig.json" 2>&1 || true
            fi
          done

      - name: Run kiloclaw tests (verification)
        run: bun run --cwd packages/opencode test test/kiloclaw/

      - name: Run tsgo for future compatibility (best-effort, non-blocking)
        run: |
          echo "Running tsgo for future compatibility check..."
          bun turbo typecheck 2>&1 || echo "tsgo errors are known - see docs/tech-debt/TechDebt_TSGO.md"
